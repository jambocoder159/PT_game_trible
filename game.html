<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, orientation=portrait">
    <title>三消挑戰 - 遊戲框架版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/game.css">
    <link rel="stylesheet" href="css/responsive-fix.css">
    <style>
        /* 禁止螢幕旋轉 */
        @media screen and (orientation: landscape) and (max-width: 768px) {
            body {
                transform: rotate(90deg);
                transform-origin: center center;
                position: absolute;
                top: 50%;
                left: 50%;
                margin-left: -50vh;
                margin-top: -50vw;
                width: 100vh;
                height: 100vw;
            }
        }
        
        /* 強制直向顯示警告 */
        .orientation-warning {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            color: white;
            z-index: 9999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }
        
        @media screen and (orientation: landscape) and (max-width: 768px) {
            .orientation-warning {
                display: flex;
            }
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-2 sm:p-4">
    
    <!-- 螢幕旋轉警告 -->
    <div class="orientation-warning">
        <div class="text-6xl mb-4">📱</div>
        <h2 class="text-2xl font-bold mb-4">請將裝置轉為直向</h2>
        <p class="text-lg text-gray-300">為了最佳遊戲體驗，請將您的手機轉為直向模式</p>
    </div>
    
    <div id="gameContainer">
        <!-- Game content will be dynamically generated by UI.js -->
    </div>
    
    <script src="js/EnvironmentConfig.js"></script>
    <script src="js/SupabaseAuth.js"></script>
    <script src="js/LeaderboardManager.js"></script>
    <script src="js/UserManager.js"></script>
    <script src="js/GlobalNavigation.js"></script>
    <script src="js/GameEngine.js"></script>
    <script src="js/GameModes.js"></script>
    <script src="js/UI.js"></script>
    <script>
        // 全域變數
        let gameEngine = null;
        let currentGameMode = null;
        let gameStartTime = null;
        
        // 從URL參數獲取遊戲模式
        function getGameModeFromURL() {
            const urlParams = new URLSearchParams(window.location.search);
            const mode = urlParams.get('mode') || 'classic';
            return GameModes[mode] ? mode : 'classic';
        }

        // 初始化用戶系統
        async function initializeUserSystem() {
            try {
                // 等待環境配置載入
                if (window.EnvironmentConfig) {
                    window.environmentConfig = new EnvironmentConfig();
                }
                
                // 等待 SupabaseAuth 初始化
                await new Promise(resolve => setTimeout(resolve, 500));
                
                if (window.supabaseAuth) {
                    // 初始化排行榜管理器
                    window.leaderboardManager = new LeaderboardManager(window.supabaseAuth);
                    
                    // 初始化用戶管理器
                    window.userManager = new UserManager(window.supabaseAuth, window.leaderboardManager);
                    
                    // 初始化全局導航
                    window.globalNav = new GlobalNavigation(window.supabaseAuth, window.userManager);
                    
                    // 手動初始化導航（會檢查當前用戶狀態）
                    await window.globalNav.init();
                    
                    console.log('用戶系統已初始化');
                } else {
                    console.warn('SupabaseAuth 未正確初始化');
                }
            } catch (error) {
                console.error('用戶系統初始化失敗:', error);
            }
        }

        // 初始化遊戲
        function initializeGame() {
            const urlParams = new URLSearchParams(window.location.search);
            const mode = urlParams.get('mode') || 'classic';
            const level = urlParams.get('level'); // 獲取關卡參數
            
            console.log('URL參數:', { mode, level });
            
            const config = GameModes[mode];
            
            if (!config) {
                console.error('無效的遊戲模式:', mode);
                return;
            }

            // 深拷貝配置以避免修改原始配置
            const gameConfig = JSON.parse(JSON.stringify(config));
            gameConfig.mode = mode; // 確保模式屬性存在

            currentGameMode = mode;
            
            // 如果是闖關模式，加載特定關卡的數據
            if (mode === 'quest') {
                console.log(`載入闖關模式 - 關卡 ${level || 1}`);
                
                // 根據關卡設置不同的敵人和難度
                const levelNum = parseInt(level) || 1;
                
                // 設定每個關卡的敵人資料
                const enemyData = {
                    1: {
                        name: "森林史萊姆",
                        description: "森林中的初級魔物，喜歡藏在樹根附近。",
                        maxHP: 50,
                        moves: 15
                    },
                    2: {
                        name: "莫菇",
                        description: "一隻掌握森林魔法的菇類魔法師，外表呆萌但擅長施放睡眠孢子。",
                        maxHP: 75,
                        moves: 15
                    },
                    3: {
                        name: "露比",
                        description: "森林中的守護者，一隻會飛的小瓢蟲，能釋放治癒花粉。",
                        maxHP: 100,
                        moves: 14
                    },
                    4: {
                        name: "影蜥",
                        description: "棲息於樹蔭之下的冷血潛行者，擅長快速移動與偷襲。",
                        maxHP: 125,
                        moves: 14
                    },
                    5: {
                        name: "希露芙",
                        description: "翅膀如幻影般的森林妖蝶，飛行速度快且能施放睡眠粉塵。",
                        maxHP: 150,
                        moves: 13
                    },
                    6: {
                        name: "塔嘎",
                        description: "背著厚重岩殼的森林巨獸，全身覆滿青苔，行動緩慢但防禦極高。",
                        maxHP: 175,
                        moves: 13
                    },
                    7: {
                        name: "希絲",
                        description: "徘徊於迷霧中的幽靈，會模仿過路旅人的聲音，引誘其迷路。",
                        maxHP: 200,
                        moves: 12
                    },
                    8: {
                        name: "庫比",
                        description: "調皮又具攻擊性的森林栗鼠，常以果實當飛彈襲擊路人。",
                        maxHP: 225,
                        moves: 12
                    },
                    9: {
                        name: "莉雅",
                        description: "來自古老森林部族的治癒者，能用花語為盟友帶來再生與庇佑。",
                        maxHP: 250,
                        moves: 11
                    },
                    10: {
                        name: "尤羅德",
                        description: "沉睡於聖樹之心千年的森林古王，擁有與整片森林連結的力量，能操控萬物植物。",
                        maxHP: 300,
                        moves: 10
                    }
                };
                
                // 取得對應關卡的敵人資料，如果關卡超出範圍則使用最後一個
                const currentEnemy = enemyData[levelNum] || enemyData[10];
                
                gameConfig.levelData.enemy.name = currentEnemy.name;
                gameConfig.levelData.enemy.description = currentEnemy.description;
                gameConfig.levelData.enemy.maxHP = currentEnemy.maxHP;
                gameConfig.levelData.moves = currentEnemy.moves;
                
                console.log('闖關模式配置:', gameConfig);
            }

            // 設置頁面標題
            document.title = gameConfig.title;
            
            // 設置背景主題
            document.body.className = `theme-${gameConfig.theme} flex flex-col items-center justify-center min-h-screen p-2 sm:p-4`;
            
            // 生成遊戲HTML
            const gameContainer = document.getElementById('gameContainer');
            if (gameContainer) {
                gameContainer.innerHTML = UIManager.createGameHTML(mode, gameConfig);
            }
            
            // 初始化遊戲引擎
            gameEngine = new GameEngine(gameConfig);
            
            // 記錄遊戲開始時間
            gameStartTime = Date.now();
            
            console.log(`遊戲模式 "${gameConfig.title}" 已初始化`);
            console.log('遊戲引擎:', gameEngine);
            
            // 調試：檢查闖關模式是否正確初始化
            if (mode === 'quest') {
                console.log('闖關模式檢查:');
                console.log('- 模式:', gameEngine.config.mode);
                console.log('- 剩餘步數:', gameEngine.movesLeft);
                console.log('- 敵人:', gameEngine.enemy);
            }
        }
        
        // 當頁面載入完成時初始化
        document.addEventListener('DOMContentLoaded', async function() {
            await initializeUserSystem();
            initializeGame();
        });
    </script>
</body>
</html>
