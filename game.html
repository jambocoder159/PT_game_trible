<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, orientation=portrait">
    <title>三消挑戰 - 遊戲框架版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/game.css">
    <link rel="stylesheet" href="css/responsive-fix.css">
    <style>
        /* 禁止螢幕旋轉 */
        @media screen and (orientation: landscape) and (max-width: 768px) {
            body {
                transform: rotate(90deg);
                transform-origin: center center;
                position: absolute;
                top: 50%;
                left: 50%;
                margin-left: -50vh;
                margin-top: -50vw;
                width: 100vh;
                height: 100vw;
            }
        }
        
        /* 強制直向顯示警告 */
        .orientation-warning {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            color: white;
            z-index: 9999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }
        
        @media screen and (orientation: landscape) and (max-width: 768px) {
            .orientation-warning {
                display: flex;
            }
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-2 sm:p-4">
    
    <!-- 螢幕旋轉警告 -->
    <div class="orientation-warning">
        <div class="text-6xl mb-4">📱</div>
        <h2 class="text-2xl font-bold mb-4">請將裝置轉為直向</h2>
        <p class="text-lg text-gray-300">為了最佳遊戲體驗，請將您的手機轉為直向模式</p>
    </div>
    
    <div id="gameContainer">
        <!-- Game content will be dynamically generated by UI.js -->
    </div>
    
    <script src="js/EnvironmentConfig.js"></script>
    <script src="js/SupabaseAuth.js"></script>
    <script src="js/LeaderboardManager.js"></script>
    <script src="js/UserManager.js"></script>
    <script src="js/GlobalNavigation.js"></script>
    <script src="js/GameEngine.js"></script>
    <script src="js/GameModes.js"></script>
    <script src="js/UI.js"></script>
    <script>
        // 全域變數
        let gameEngine = null;
        let currentGameMode = null;
        let gameStartTime = null;
        
        // 從URL參數獲取遊戲模式
        function getGameModeFromURL() {
            const urlParams = new URLSearchParams(window.location.search);
            const mode = urlParams.get('mode') || 'classic';
            return GameModes[mode] ? mode : 'classic';
        }

        // 初始化用戶系統
        async function initializeUserSystem() {
            try {
                // 等待環境配置載入
                if (window.EnvironmentConfig) {
                    window.environmentConfig = new EnvironmentConfig();
                }
                
                // 等待 SupabaseAuth 初始化
                await new Promise(resolve => setTimeout(resolve, 500));
                
                if (window.supabaseAuth) {
                    // 初始化排行榜管理器
                    window.leaderboardManager = new LeaderboardManager(window.supabaseAuth);
                    
                    // 初始化用戶管理器
                    window.userManager = new UserManager(window.supabaseAuth, window.leaderboardManager);
                    
                    // 初始化全局導航
                    window.globalNav = new GlobalNavigation(window.supabaseAuth, window.userManager);
                    
                    // 手動初始化導航（會檢查當前用戶狀態）
                    await window.globalNav.init();
                    
                    console.log('用戶系統已初始化');
                } else {
                    console.warn('SupabaseAuth 未正確初始化');
                }
            } catch (error) {
                console.error('用戶系統初始化失敗:', error);
            }
        }

        // 初始化遊戲
        function initializeGame() {
            const urlParams = new URLSearchParams(window.location.search);
            const mode = urlParams.get('mode') || 'classic';
            const level = urlParams.get('level'); // 獲取關卡參數
            
            console.log('URL參數:', { mode, level });
            
            const config = GameModes[mode];
            
            if (!config) {
                console.error('無效的遊戲模式:', mode);
                return;
            }

            // 深拷貝配置以避免修改原始配置
            const gameConfig = JSON.parse(JSON.stringify(config));
            gameConfig.mode = mode; // 確保模式屬性存在

            currentGameMode = mode;
            
            // 如果是闖關模式，加載特定關卡的數據
            if (mode === 'quest') {
                console.log(`載入闖關模式 - 關卡 ${level || 1}`);
                
                // 根據關卡設置不同的敵人和難度
                const levelNum = parseInt(level) || 1;
                
                // 暫時限制只能玩到第10關
                if (levelNum > 10) {
                    console.error(`關卡 ${levelNum} 暫未開放，目前最高只能到第10關`);
                    showLevelNotAvailableModal(levelNum, '此關卡暫未開放，敬請期待後續更新！');
                    return;
                }
                
                // 從 GameModes 獲取關卡資料
                const levelDetails = GameModes.quest.levelDetails;
                
                // 檢查關卡資料是否存在
                const currentEnemy = levelDetails[levelNum];
                
                if (!currentEnemy) {
                    console.error(`關卡 ${levelNum} 的資料不存在`);
                    showLevelNotAvailableModal(levelNum, '關卡資料尚未建立，請選擇其他關卡進行挑戰。');
                    return;
                }
                
                gameConfig.levelData.enemy.name = currentEnemy.name;
                gameConfig.levelData.enemy.description = currentEnemy.description;
                gameConfig.levelData.enemy.maxHP = currentEnemy.maxHP;
                gameConfig.levelData.moves = currentEnemy.moves;
                gameConfig.levelData.restrictions = currentEnemy.restrictions;
                
                console.log('闖關模式配置:', gameConfig);
            }

            // 設置頁面標題
            document.title = gameConfig.title;
            
            // 設置背景主題
            document.body.className = `theme-${gameConfig.theme} flex flex-col items-center justify-center min-h-screen p-2 sm:p-4`;
            
            // 生成遊戲HTML
            const gameContainer = document.getElementById('gameContainer');
            if (gameContainer) {
                gameContainer.innerHTML = UIManager.createGameHTML(mode, gameConfig);
            }
            
            // 初始化遊戲引擎
            gameEngine = new GameEngine(gameConfig);
            
            // 記錄遊戲開始時間
            gameStartTime = Date.now();
            
            console.log(`遊戲模式 "${gameConfig.title}" 已初始化`);
            console.log('遊戲引擎:', gameEngine);
            
            // 調試：檢查闖關模式是否正確初始化
            if (mode === 'quest') {
                console.log('闖關模式檢查:');
                console.log('- 模式:', gameEngine.config.mode);
                console.log('- 剩餘步數:', gameEngine.movesLeft);
                console.log('- 敵人:', gameEngine.enemy);
            }

            // 為 info icon 添加點擊事件
            const infoIcon = document.getElementById('quest-info-icon');
            if (infoIcon) {
                infoIcon.addEventListener('click', () => {
                    UIManager.showRestrictionsPopup(gameEngine.config.levelData.restrictions);
                });
            }
        }
        
        // 顯示關卡尚未建立的彈窗
        function showLevelNotAvailableModal(levelNum, message) {
            const modalOverlay = document.createElement('div');
            modalOverlay.className = 'fixed inset-0 bg-black/70 flex items-center justify-center z-50';
            modalOverlay.id = 'level-not-available-modal';
            
            modalOverlay.innerHTML = `
                <div class="bg-gray-800 border-2 border-yellow-500/50 rounded-2xl shadow-lg w-full max-w-sm m-4 p-6">
                    <div class="text-center">
                        <div class="text-6xl mb-4">🚧</div>
                        <h2 class="text-2xl font-bold text-yellow-400 mb-4">關卡無法進入</h2>
                        <p class="text-gray-300 mb-6">${message}</p>
                        <button id="return-to-quest-btn" class="w-full bg-yellow-500 hover:bg-yellow-400 text-gray-900 font-bold py-3 rounded-lg transition-colors">
                            返回選關頁面
                        </button>
                    </div>
                </div>
            `;
            
            document.body.appendChild(modalOverlay);
            
            // 點擊按鈕返回選關頁面
            modalOverlay.querySelector('#return-to-quest-btn').onclick = () => {
                window.location.href = 'quest-mode.html';
            };
            
            // 點擊外部也可以關閉（並返回選關頁面）
            modalOverlay.onclick = (e) => {
                if (e.target === modalOverlay) {
                    window.location.href = 'quest-mode.html';
                }
            };
        }
        
        // 當頁面載入完成時初始化
        document.addEventListener('DOMContentLoaded', async function() {
            await initializeUserSystem();
            initializeGame();
        });
    </script>
</body>
</html>
