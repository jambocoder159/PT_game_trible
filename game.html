<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, orientation=portrait">
    <title>三消挑戰 - 遊戲框架版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/game.css">
    <link rel="stylesheet" href="css/responsive-fix.css">
    <style>
        /* 禁止螢幕旋轉 */
        @media screen and (orientation: landscape) and (max-width: 768px) {
            body {
                transform: rotate(90deg);
                transform-origin: center center;
                position: absolute;
                top: 50%;
                left: 50%;
                margin-left: -50vh;
                margin-top: -50vw;
                width: 100vh;
                height: 100vw;
            }
        }
        
        /* 強制直向顯示警告 */
        .orientation-warning {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            color: white;
            z-index: 9999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }
        
        @media screen and (orientation: landscape) and (max-width: 768px) {
            .orientation-warning {
                display: flex;
            }
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-2 sm:p-4">
    
    <!-- 螢幕旋轉警告 -->
    <div class="orientation-warning">
        <div class="text-6xl mb-4">📱</div>
        <h2 class="text-2xl font-bold mb-4">請將裝置轉為直向</h2>
        <p class="text-lg text-gray-300">為了最佳遊戲體驗，請將您的手機轉為直向模式</p>
    </div>
    
    <div id="gameContainer"></div>
    
    <script src="js/EnvironmentConfig.js"></script>
    <script src="js/SupabaseAuth.js"></script>
    <script src="js/LeaderboardManager.js"></script>
    <script src="js/UserManager.js"></script>
    <script src="js/GlobalNavigation.js"></script>
    <script src="js/GameEngine.js"></script>
    <script src="js/GameModes.js"></script>
    <script src="js/UI.js"></script>
    <script>
        // 全域變數
        let gameEngine = null;
        let currentGameMode = null;
        let gameStartTime = null;
        
        // 從URL參數獲取遊戲模式
        function getGameModeFromURL() {
            const urlParams = new URLSearchParams(window.location.search);
            const mode = urlParams.get('mode') || 'classic';
            return GameModes[mode] ? mode : 'classic';
        }

        // 初始化用戶系統
        async function initializeUserSystem() {
            try {
                // 等待環境配置載入
                if (window.EnvironmentConfig) {
                    window.environmentConfig = new EnvironmentConfig();
                }
                
                // 等待 SupabaseAuth 初始化
                await new Promise(resolve => setTimeout(resolve, 500));
                
                if (window.supabaseAuth) {
                    // 初始化排行榜管理器
                    window.leaderboardManager = new LeaderboardManager(window.supabaseAuth);
                    
                    // 初始化用戶管理器
                    window.userManager = new UserManager(window.supabaseAuth, window.leaderboardManager);
                    
                    // 初始化全局導航
                    window.globalNav = new GlobalNavigation(window.supabaseAuth, window.userManager);
                    
                    // 手動初始化導航（會檢查當前用戶狀態）
                    await window.globalNav.init();
                    
                    console.log('用戶系統已初始化');
                } else {
                    console.warn('SupabaseAuth 未正確初始化');
                }
            } catch (error) {
                console.error('用戶系統初始化失敗:', error);
            }
        }

        // 初始化遊戲
        function initializeGame() {
            const mode = getGameModeFromURL();
            const config = GameModes[mode];
            
            if (!config) {
                console.error('無效的遊戲模式:', mode);
                return;
            }

            currentGameMode = mode;
            
            // 設置頁面標題
            document.title = config.title;
            
            // 設置背景主題
            document.body.className = `theme-${config.theme} flex flex-col items-center justify-center min-h-screen p-2 sm:p-4`;
            
            // 生成遊戲HTML
            const gameContainer = document.getElementById('gameContainer');
            if (gameContainer) {
                gameContainer.innerHTML = UIManager.createGameHTML(mode, config);
            }
            
            // 初始化遊戲引擎
            gameEngine = new GameEngine(config);
            
            // 正確覆寫遊戲結束處理
            if (gameEngine && typeof gameEngine.triggerGameOver === 'function') {
                const originalTriggerGameOver = gameEngine.triggerGameOver.bind(gameEngine);
                gameEngine.triggerGameOver = function() {
                    originalTriggerGameOver();
                    handleGameEnd();
                };
            }
            
            // 記錄遊戲開始時間
            gameStartTime = Date.now();
            
            console.log(`遊戲模式 "${config.title}" 已初始化`);
            console.log('遊戲引擎:', gameEngine);
        }
        
        // 處理遊戲結束
        async function handleGameEnd() {
            if (!window.supabaseAuth?.isAuthenticated()) {
                return; // 用戶未登入，不保存成績
            }
            
            try {
                const gameTime = Date.now() - gameStartTime;
                const gameData = {
                    mode: currentGameMode,
                    score: gameEngine.score,
                    moves: gameEngine.actionCount,
                    time: gameTime,
                    level: 1 // 如果有關卡系統的話
                };
                
                await window.supabaseAuth.saveGameRecord(gameData);
                if (window.userManager && window.userManager.showSuccess) {
                    window.userManager.showSuccess('成績已保存！');
                }
                
                // 清除排行榜快取以顯示最新結果
                if (window.leaderboardManager && window.leaderboardManager.clearCache) {
                    window.leaderboardManager.clearCache();
                }
                
            } catch (error) {
                console.error('保存遊戲成績失敗:', error);
                if (window.userManager && window.userManager.showError) {
                    window.userManager.showError('保存成績失敗：' + error.message);
                }
            }
        }

        // 當頁面載入完成時初始化
        document.addEventListener('DOMContentLoaded', async function() {
            await initializeUserSystem();
            initializeGame();
        });
    </script>
</body>
</html>
