<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, orientation=portrait">
    <title>三消挑戰 - 歡迎</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Poppins:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', 'Noto Sans TC', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            overflow: hidden;
        }
        
        /* 禁止螢幕旋轉 */
        @media screen and (orientation: landscape) and (max-width: 768px) {
            body {
                transform: rotate(90deg);
                transform-origin: center center;
                position: absolute;
                top: 50%;
                left: 50%;
                margin-left: -50vh;
                margin-top: -50vw;
                width: 100vh;
                height: 100vw;
            }
        }
        
        /* 強制直向顯示警告 */
        .orientation-warning {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            color: white;
            z-index: 9999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }
        
        @media screen and (orientation: landscape) and (max-width: 768px) {
            .orientation-warning {
                display: flex;
            }
        }
        
        .game-logo {
            font-size: 4rem;
            font-weight: 900;
            background: linear-gradient(45deg, #FFD700, #FFA500, #FF6B6B);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientShift 3s ease-in-out infinite;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.5);
        }
        
        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        
        .start-button {
            background: linear-gradient(45deg, #FF6B6B, #4ECDC4);
            transition: all 0.3s ease;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            position: relative;
            overflow: hidden;
        }
        
        .start-button:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
        }
        
        .start-button:active {
            transform: translateY(-1px) scale(1.02);
        }
        
        .start-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }
        
        .start-button:hover::before {
            left: 100%;
        }
        
        .floating-blocks {
            position: absolute;
            width: 40px;
            height: 40px;
            border-radius: 8px;
            animation: float 6s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(180deg); }
        }
        
        .pulse-ring {
            animation: pulseRing 2s cubic-bezier(0.455, 0.03, 0.515, 0.955) infinite;
        }
        
        @keyframes pulseRing {
            0% { transform: scale(0.33); }
            80%, 100% { opacity: 0; }
        }
        
        .fade-in-up {
            animation: fadeInUp 1s ease-out;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .subtitle {
            animation: fadeInUp 1s ease-out 0.5s both;
        }
        
        .start-section {
            animation: fadeInUp 1s ease-out 1s both;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center relative">
    
    <!-- 螢幕旋轉警告 -->
    <div class="orientation-warning">
        <div class="text-6xl mb-4">📱</div>
        <h2 class="text-2xl font-bold mb-4">請將裝置轉為直向</h2>
        <p class="text-lg text-gray-300">為了最佳遊戲體驗，請將您的手機轉為直向模式</p>
    </div>
    
    <!-- 浮動方塊背景裝飾 -->
    <div class="floating-blocks bg-red-400" style="top: 10%; left: 10%; animation-delay: 0s;"></div>
    <div class="floating-blocks bg-blue-400" style="top: 20%; right: 15%; animation-delay: 1s;"></div>
    <div class="floating-blocks bg-green-400" style="bottom: 30%; left: 20%; animation-delay: 2s;"></div>
    <div class="floating-blocks bg-yellow-400" style="bottom: 10%; right: 10%; animation-delay: 3s;"></div>
    <div class="floating-blocks bg-purple-400" style="top: 50%; left: 5%; animation-delay: 4s;"></div>
    <div class="floating-blocks bg-pink-400" style="top: 60%; right: 5%; animation-delay: 5s;"></div>
    
    <!-- 主要內容 -->
    <div class="text-center z-10 px-4">
        <!-- 遊戲LOGO -->
        <div class="mb-8 fade-in-up">
            <h1 class="game-logo mb-4">三消挑戰</h1>
            <div class="text-white text-xl font-medium subtitle">
                Match-3 Challenge
            </div>
        </div>
        
        <!-- 遊戲簡介 -->
        <div class="mb-12 max-w-md mx-auto subtitle">
            <p class="text-white/90 text-lg leading-relaxed">
                🎮 經典三消遊戲全新體驗<br>
                🏆 挑戰全球排行榜<br>
                ⚡ 多種模式等你挑戰
            </p>
        </div>
        
        <!-- 開始按鈕 -->
        <div class="start-section">
            <button onclick="startGame()" class="start-button text-white font-bold py-4 px-12 text-xl rounded-full relative">
                <span class="relative z-10">開始遊戲</span>
            </button>
            
            <!-- 脈衝環效果 -->
            <div class="absolute inset-0 rounded-full border-4 border-white/30 pulse-ring"></div>
        </div>
        
        <!-- 版本資訊 -->
        <div class="mt-16 text-white/60 text-sm">
            Version 2.0 | 模組化框架版
        </div>
    </div>
    
    <!-- 音效提示（可選） -->
    <div class="absolute bottom-4 right-4 text-white/50 text-xs">
        💡 建議開啟音效以獲得最佳體驗
    </div>

    <script>
        // 預載入重要資源
        const preloadImages = [
            // 這裡放置需要預載入的圖片路徑
        ];
        
        // 音效文件預載入（如果有）
        const preloadSounds = [
            // 'assets/sounds/click.mp3',
            // 'assets/sounds/match.mp3'
        ];
        
        function startGame() {
            // 添加點擊音效（如果有）
            // playSound('click');
            
            // 顯示載入畫面
            showLoadingScreen();
            
            // 模擬載入過程，然後跳轉到主畫面
            setTimeout(() => {
                window.location.href = 'main-menu.html';
            }, 2000);
        }
        
        function showLoadingScreen() {
            // 創建載入覆蓋層
            const loadingOverlay = document.createElement('div');
            loadingOverlay.innerHTML = `
                <div class="fixed inset-0 bg-gradient-to-br from-purple-900 to-indigo-900 flex flex-col items-center justify-center z-50">
                    <div class="text-center">
                        <div class="w-16 h-16 border-4 border-white/20 border-t-white rounded-full animate-spin mb-6"></div>
                        <h2 class="text-white text-2xl font-bold mb-2">載入中...</h2>
                        <p class="text-white/70 text-sm">正在準備遊戲資源</p>
                        <div class="mt-6 w-64">
                            <div class="bg-white/20 rounded-full h-2">
                                <div class="bg-gradient-to-r from-blue-400 to-purple-400 h-2 rounded-full loading-bar" style="width: 0%"></div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            
            document.body.appendChild(loadingOverlay);
            
            // 模擬載入進度
            const loadingBar = loadingOverlay.querySelector('.loading-bar');
            let progress = 0;
            const interval = setInterval(() => {
                progress += Math.random() * 15;
                if (progress > 100) progress = 100;
                loadingBar.style.width = progress + '%';
                
                if (progress >= 100) {
                    clearInterval(interval);
                }
            }, 100);
        }
        
        // 頁面載入時的動畫效果
        document.addEventListener('DOMContentLoaded', function() {
            // 可以在這裡添加額外的初始化邏輯
            console.log('遊戲起始畫面已載入');
        });
        
        // 鍵盤快捷鍵支援
        document.addEventListener('keydown', function(event) {
            if (event.key === 'Enter' || event.key === ' ') {
                event.preventDefault();
                startGame();
            }
        });
    </script>
</body>
</html>
