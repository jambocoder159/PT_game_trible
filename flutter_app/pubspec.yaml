name: match3_puzzle
description: 貓咪點心屋 - Kitty Pastry House Match-3 Puzzle Mobile Game
publish_to: 'none'
version: 1.0.0+2

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.2

  # Audio
  audioplayers: ^6.1.0

  # Backend
  supabase_flutter: ^2.8.0

  # Utils
  shared_preferences: ^2.3.4
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/output/app_icons/app_icon_1024.png"
  web:
    generate: true
    image_path: "assets/images/output/app_icons/app_icon_192.png"
    background_color: "#FFF5E1"
    theme_color: "#E86B30"

flutter_native_splash:
  color: "#FFF5E1"
  image: "assets/images/output/app_icons/splash_logo.png"
  android_12:
    color: "#FFF5E1"
    image: "assets/images/output/app_icons/splash_logo.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/output/avatars/
    - assets/images/output/blocks/
    - assets/images/output/characters/
    - assets/images/output/icons/
    - assets/images/output/background/
    - assets/images/output/enemies/
    - assets/images/output/bosses/
    - assets/images/output/vfx/
    - assets/images/output/evolutions/
    - assets/images/output/app_icons/
    - assets/images/icons/
    - assets/balance/
    - assets/audio/sfx/
    - assets/audio/bgm/
    - assets/fonts/

  fonts:
    - family: jf-openhuninn
      fonts:
        - asset: assets/fonts/jf-openhuninn.ttf
