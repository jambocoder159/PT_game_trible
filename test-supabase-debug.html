<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SupabaseAuth 偵錯測試</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <h1>SupabaseAuth 偵錯測試</h1>
    <div id="results"></div>

    <script src="js/EnvironmentConfig.js"></script>
    <script src="js/SupabaseAuth.js"></script>
    
    <script>
        function logResult(message) {
            const results = document.getElementById('results');
            results.innerHTML += '<div>' + message + '</div>';
            console.log(message);
        }

        // 等待一下讓所有腳本載入
        setTimeout(() => {
            logResult('=== SupabaseAuth 偵錯開始 ===');
            logResult('window.supabaseAuth 存在: ' + !!window.supabaseAuth);
            logResult('window.supabaseAuth 類型: ' + typeof window.supabaseAuth);
            
            if (window.supabaseAuth) {
                logResult('window.supabaseAuth 建構函式: ' + window.supabaseAuth.constructor.name);
                
                // 檢查原型鏈
                const proto = Object.getPrototypeOf(window.supabaseAuth);
                logResult('原型鏈存在: ' + !!proto);
                logResult('原型鏈建構函式: ' + (proto ? proto.constructor.name : 'null'));
                
                // 檢查方法
                logResult('saveQuestRecord 方法存在: ' + ('saveQuestRecord' in window.supabaseAuth));
                logResult('saveQuestRecord 方法類型: ' + typeof window.supabaseAuth.saveQuestRecord);
                logResult('getPlayerQuestProgress 方法存在: ' + ('getPlayerQuestProgress' in window.supabaseAuth));
                logResult('getPlayerQuestProgress 方法類型: ' + typeof window.supabaseAuth.getPlayerQuestProgress);
                
                // 列出所有可用的方法
                const methods = [];
                let obj = window.supabaseAuth;
                while (obj) {
                    Object.getOwnPropertyNames(obj).forEach(name => {
                        if (typeof obj[name] === 'function' && name !== 'constructor') {
                            methods.push(name);
                        }
                    });
                    obj = Object.getPrototypeOf(obj);
                    if (obj === Object.prototype) break;
                }
                logResult('可用方法: ' + methods.join(', '));
                
                // 測試方法調用
                try {
                    if (typeof window.supabaseAuth.isAuthenticated === 'function') {
                        const isAuth = window.supabaseAuth.isAuthenticated();
                        logResult('isAuthenticated() 結果: ' + isAuth);
                    } else {
                        logResult('isAuthenticated 方法不存在');
                    }
                } catch (error) {
                    logResult('調用 isAuthenticated 時發生錯誤: ' + error.message);
                }
            }
        }, 1000);
    </script>
</body>
</html>
